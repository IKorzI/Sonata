name: E2E Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    timeout-minutes: 60
    runs-on: windows-latest

    steps:
      - name: Получение кода
        uses: actions/checkout@v4

      - name: Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установка зависимостей Python (PyInstaller)
        run: |
          pip install -r src/scripts/python/requirements.txt

      - name: Установка Node-модулей
        run: npm install

      - name: Установка браузеров для Playwright
        run: npx playwright install --with-deps chromium

      - name: Сборка C#
        run: npm run C#:build

      - name: Сборка Python
        run: npm run py:build

      - name: Сборка Vite (Frontend)
        run: npm run vite:build

      - name: Run Playwright tests
        run: npx playwright test --retries=2
        env:
          CI: true
