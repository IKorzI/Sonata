name: E2E Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Получение кода
        uses: actions/checkout@v4

      - name: Установка Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установка зависимостей Python (PyInstaller)
        run: |
          pip install -r src/scripts/python/requirements.txt

      - name: Установка Node-модулей
        run: npm install

      - name: Install System Dependencies & Update PATH
        run: |
          choco install libreoffice --no-progress -y
          choco install graphicsmagick --no-progress -y
          choco install ghostscript --no-progress -y

          # Динамически ищем папку установки GraphicsMagick и добавляем в PATH
          $gmPath = (Get-ChildItem -Path "C:\Program Files\GraphicsMagick-*" -Directory | Select-Object -First 1).FullName
          if ($gmPath) { 
            Write-Output "Found GraphicsMagick at: $gmPath"
            Add-Content -Path $env:GITHUB_PATH -Value $gmPath 
          }

          # Динамически ищем папку установки Ghostscript (bin) и добавляем в PATH
          $gsPath = (Get-ChildItem -Path "C:\Program Files\gs\gs*\bin" -Directory | Select-Object -First 1).FullName
          if ($gsPath) { 
            Write-Output "Found Ghostscript at: $gsPath"
            Add-Content -Path $env:GITHUB_PATH -Value $gsPath 
          }

      - name: Verify Dependencies (Debug)
        run: |
          # Проверяем, что консоль теперь видит команды
          gm version
          gswin64c -v

      - name: Установка браузеров для Playwright (нужно для работы фреймворка)
        run: npx playwright install --with-deps chromium

      - name: Сборка C#
        run: npm run C#:build

      - name: Сборка Python
        run: npm run py:build

      - name: Сборка Vite (Frontend)
        run: npm run vite:build

      - name: Запуск E2E тестов
        run: npx playwright test
